<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Not found — evelyra.app</title>
<meta name="robots" content="noindex,nofollow" />
<script>
  // GH Pages SPA fallback: rewrite /pro-intake/<token> to /pro-intake/?t=<token>
  (function () {
    var path = window.location.pathname.replace(/\/+$/, '');
    var parts = path.split('/').filter(Boolean);
    if (parts.length >= 2 && parts[0] === 'pro-intake') {
      var token = parts[1];
      // Avoid redirect loops on /pro-intake/submitted etc.
      if (token && token !== 'submitted' && token.length >= 10) {
        var search = window.location.search;
        var qs = search ? search + '&t=' + encodeURIComponent(token) : '?t=' + encodeURIComponent(token);
        window.location.replace('/pro-intake/' + qs);
        return;
      }
    }
  })();
</script>

  body { background: #07070a; color: #e9e9ee; font-family: ui-monospace, "JetBrains Mono", "SF Mono", Menlo, Consolas, monospace; -webkit-font-smoothing: antialiased; min-height: 100vh; margin: 0; display: flex; align-items: center; justify-content: center; padding: 32px; }

  p { color: #8a8a96; line-height: 1.65; font-size: 15px; margin: 0 0 22px; }
  a { color: #FFD400; text-decoration: none; font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase; font-size: 13px; border: 1px solid #FFD400; padding: 12px 22px; border-radius: 4px; display: inline-block; }
  a:hover { background: #FFD400; color: #07070a; }
</style>
